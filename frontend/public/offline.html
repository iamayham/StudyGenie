<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#000000" />
    <title>StudyGenie - Offline</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
        background: #f8fafc;
        color: #0f172a;
      }
      .card {
        width: min(92vw, 460px);
        border: 1px solid #e2e8f0;
        border-radius: 18px;
        background: #fff;
        padding: 24px;
        text-align: center;
        box-shadow: 0 10px 25px rgba(15, 23, 42, 0.08);
      }
      .title {
        margin: 12px 0 8px;
        font-size: 1.35rem;
      }
      .text {
        margin: 0;
        color: #475569;
      }
      img {
        width: 64px;
        height: 64px;
        border-radius: 16px;
      }
    </style>
  </head>
  <body>
    <main class="card">
      <img src="/branding/icon-app.png" alt="StudyGenie icon" />
      <h1 class="title">You are offline</h1>
      <p class="text">StudyGenie is unavailable right now. Reconnect to continue.</p>
    </main>
  </body>
</html>
